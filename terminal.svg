M, Langfuse,</text><text class="line l16" x="0" y="357" font-size="14" fill="#8A8784">               Groq, Mistral, DeepSeek, MCP Server Orchestration</text><text class="line l17" x="0" y="378" font-size="14" fill="#8A8784">Net/Security.: NGINX, Ingress NGINX, HAProxy, ALB/NLB, VPN, Cert Mgr, IAM</text><text class="line l18" x="0" y="399" font-size="14" fill="#8A8784">Data/Msg.....: MongoDB, Redis, Kafka, Qdrant, Temporal, Postgres, EMQX</text><text class="line l19" x="0" y="420" font-size="14" fill="#8A8784">Monitoring...: Prometheus, Grafana, Loki, CloudWatch, Azure Monitor</text><text class="line l20" x="0" y="462" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">git log --experience</tspan></text><text class="line l21" x="0" y="483" font-size="14" fill="#D9A557" font-weight="bold">● Cloud Operations Engineer (DevOps) — Wexa AI</text><text class="line l22" x="0" y="504" font-size="14" fill="#8A8784">  May 2023 - Present · Hyderabad</text><text class="line l23" x="0" y="525" font-size="14" fill="#D9A557" font-weight="bold">● Software Engineer Trainee — Revidd</text><text class="line l24" x="0" y="546" font-size="14" fill="#8A8784">  Jun 2022 - Apr 2023 · Vizag</text><text class="line l25" x="0" y="588" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">ls ./projects</tspan></text><text class="line l26" x="0" y="609" font-size="14"><tspan fill="#8A8784">&#8594;</tspan><tspan fill="#E8E6E3" dx="8">Wexa Platform — multi-cloud infra, LLMs @ 500K+ tokens/min</tspan></text><text class="line l27" x="0" y="630" font-size="14"><tspan fill="#8A8784">&#8594;</tspan><tspan fill="#E8E6E3" dx="8">Logistics IoT (Cognochain) — K8s, Kafka+EMQX for 3M+ devices</tspan></text><text class="line l28" x="0" y="651" font-size="14"><tspan fill="#8A8784">&#8594;</tspan><tspan fill="#E8E6E3" dx="8">Spaces / Mindsome AI (Revidd) — Next.js + Firebase</tspan></text><text class="line l29" x="0" y="693" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">cat achievements.log</tspan></text><text class="line l30" x="0" y="714" font-size="14"><tspan fill="#7EC699">&#10004;</tspan><tspan fill="#E8E6E3" dx="8">Migrated infra Azure-&gt;AWS in &lt;7 days, zero downtime</tspan></text><text class="line l31" x="0" y="735" font-size="14"><tspan fill="#7EC699">&#10004;</tspan><tspan fill="#E8E6E3" dx="8">Scaled IoT platform to 3M+ devices (Kafka + EMQX)</tspan></text><text class="line l32" x="0" y="756" font-size="14"><tspan fill="#7EC699">&#10004;</tspan><tspan fill="#E8E6E3" dx="8">Secured $50K+ in cloud credits</tspan></text><text class="line l33" x="0" y="777" font-size="14"><tspan fill="#7EC699">&#10004;</tspan><tspan fill="#E8E6E3" dx="8">Cut cloud spend 35% via migration &amp; optimization</tspan></text><text class="line l34" x="0" y="819" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">cat education.txt</tspan></text><text class="line l35" x="0" y="840" font-size="14" fill="#8A8784">B.Tech EEE — GMR Institute of Technology, Rajam (2019-2023)</text><text class="line l36" x="0" y="882" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">echo $LANG $INTERESTS</tspan></text><text class="line l37" x="0" y="903" font-size="14" fill="#8A8784">English · Telugu · Hindi | Cloud-native, AI tooling, DX</text><text class="line l38" x="0" y="945" font-size="14" fill="#D97757" font-weight="bold">&#10095;</text><rect class="line cursorblink" x="16" y="934" width="9" height="15" fill="#D97757"/></g></svg>
