  <text class="line l5" y="114"><tspan class="green">✔</tspan><tspan class="txt" dx="8">Migrated Azure → AWS in &lt;7 days, zero downtime (-35%)</tspan></text>
  <text class="line l6" y="136"><tspan class="green">✔</tspan><tspan class="txt" dx="8">Scaled AI inference to 700M+ tokens/min</tspan></text>
  <text class="line l7" y="158"><tspan class="green">✔</tspan><tspan class="txt" dx="8">Powered an IoT platform of 3M+ devices</tspan></text>
