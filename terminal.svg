<svg xmlns="http://www.w3.org/2000/svg" width="820" height="460" viewBox="0 0 820 460" fill="none" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace">
<defs>
<style>
  .txt { fill:#E8E6E3; font-size:15px; }
  .dim { fill:#8A8784; font-size:15px; }
  .accent { fill:#D97757; font-size:15px; }
  .green { fill:#7EC699; font-size:15px; }
  .prompt { fill:#D97757; font-size:15px; font-weight:bold; }
  .title { fill:#8A8784; font-size:13px; }
  .line { opacity:0; animation: appear .3s forwards; }
  @keyframes appear { from{opacity:0; transform:translateY(4px);} to { opacity:1; transform:translateY(0);} }
  .cursor { fill:#D97757; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .l1{animation-delay:.2s}.l2{animation-delay:1.6s}.l3{animation-delay:2.1s}
  .l4{animation-delay:2.8s}.l5{animation-delay:4.0s}.l6{animation-delay:4.4s}
  .l7{animation-delay:4.8s}.l8{animation-delay:5.2s}.l9{animation-delay:6.4s}
  .l10{animation-delay:7.0s}.l11{animation-delay:7.4s}.l12{animation-delay:7.8s}
  .l14{animation-delay:8.6s}
</style>
</defs>
<rect x="0" y="0" width="820" height="460" rx="12" fill="#1E1E1E"/>
<rect x="0" y="0" width="820" height="36" rx="12" fill="#2A2A28"/>
<rect x="0" y="24" width="820" height="12" fill="#2A2A28"/>
<circle cx="22" cy="18" r="6" fill="#ED6A5E"/>
<circle cx="42" cy="18" r="6" fill="#F4BF4F"/>
<circle cx="62" cy="18" r="6" fill="#61C554"/>
