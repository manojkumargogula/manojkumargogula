 HAProxy, ALB/NLB, VPN, Cert Mgr, IAM</text><style>.l1{animation-delay:7.23s}</style><text class="line l1" x="0" y="399" font-size="14" fill="#8A8784">Data/Msg.....: MongoDB, Redis, Kafka, Qdrant, Temporal, Postgres, EMQX</text><style>.l1{animation-delay:7.51s}</style><text class="line l1" x="0" y="420" font-size="14" fill="#8A8784">Monitoring...: Prometheus, Grafana, Loki, CloudWatch, Azure Monitor</text><style>.l1{animation-delay:7.79s}</style><style>.l1{animation-delay:8.07s}</style><text class="line l1" x="0" y="462" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">git log --experience</tspan></text><style>.l1{animation-delay:8.62s}</style><text class="line l1" x="0" y="483" font-size="14" fill="#D9A557" font-weight="bold">● Cloud Operations Engineer (DevOps) — Wexa AI</text><style>.l1{animation-delay:8.90s}</style><text class="line l1" x="0" y="504" font-size="14" fill="#8A8784">  May 2023 - Present · Hyderabad</text><style>.l1{animation-delay:9.18s}</style><text class="line l1" x="0" y="525" font-size="14" fill="#D9A557" font-weight="bold">● Software Engineer Trainee — Revidd</text><style>.l1{animation-delay:9.46s}</style><text class="line l1" x="0" y="546" font-size="14" fill="#8A8784">  Jun 2022 - Apr 2023 · Vizag</text><style>.l1{animation-delay:9.74s}</style><style>.l1{animation-delay:10.02s}</style><text class="line l1" x="0" y="588" font-size="14"><tspan fill="#D97757" font-weight="bold">&#10095;</tspan><tspan fill="#D97757" dx="10">ls ./projects</tspan></text><style>.l1{animation-delay:10.57s}</style><text class="line l1" x="0" y="609" font-size="14"><tspan fill="#8A8784">&#8594;</tspan><tspan fill="#E8E6E3" dx="8">Wexa Platform — multi-cloud infra, LLMs @ 500K+ tokens/min</tspan></text><style>.l1{animation-delay:10.85s}</style><text class="line l1" x="0" y="630" font-size="14"><tspan fill="#8A8784">&#8594;</tspan><tspan fill="#E8E6E3" dx="8">Logistics IoT (Cognochain) — K8s, Kafka+EMQX for 3M+ device